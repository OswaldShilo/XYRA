<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Market Stand Illustration -->
  <defs>
    <linearGradient id="woodGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B6C47;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5C4E37;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Tent Top -->
  <rect x="60" y="20" width="280" height="40" rx="8" fill="#CC6633"/>
  <polygon points="60,60 80,40 320,40 340,60" fill="#E67E22"/>
  
  <!-- Tent Stripes -->
  <rect x="60" y="60" width="20" height="120" fill="#E67E22"/>
  <rect x="100" y="60" width="20" height="120" fill="#F5DEB3"/>
  <rect x="140" y="60" width="20" height="120" fill="#E67E22"/>
  <rect x="180" y="60" width="20" height="120" fill="#F5DEB3"/>
  <rect x="220" y="60" width="20" height="120" fill="#E67E22"/>
  <rect x="260" y="60" width="20" height="120" fill="#F5DEB3"/>
  <rect x="300" y="60" width="20" height="120" fill="#E67E22"/>
  <rect x="320" y="60" width="20" height="120" fill="#F5DEB3"/>
  
  <!-- Counter/Table -->
  <rect x="50" y="180" width="300" height="150" fill="url(#woodGradient)" stroke="#3C2817" stroke-width="2"/>
  
  <!-- Shelves -->
  <rect x="70" y="140" width="260" height="15" fill="#8B6C47" stroke="#3C2817" stroke-width="2"/>
  <rect x="70" y="100" width="260" height="15" fill="#8B6C47" stroke="#3C2817" stroke-width="2"/>
  
  <!-- Vegetables -->
  <!-- Tomatoes -->
  <circle cx="120" cy="210" r="12" fill="#DC143C"/>
  <circle cx="140" cy="210" r="12" fill="#DC143C"/>
  <circle cx="100" cy="230" r="12" fill="#DC143C"/>
  <circle cx="125" cy="240" r="12" fill="#DC143C"/>
  
  <!-- Lettuce -->
  <ellipse cx="180" cy="200" rx="25" ry="20" fill="#7CB342"/>
  <ellipse cx="200" cy="195" rx="22" ry="18" fill="#8BC34A"/>
  <ellipse cx="220" cy="200" rx="25" ry="20" fill="#7CB342"/>
  
  <!-- Bananas -->
  <ellipse cx="90" cy="130" rx="15" ry="30" fill="#FFD700"/>
  <ellipse cx="110" cy="125" rx="14" ry="28" fill="#FFD700"/>
  <ellipse cx="130" cy="130" rx="15" ry="30" fill="#FFD700"/>
  
  <!-- Carrots -->
  <circle cx="280" cy="210" r="10" fill="#FF8C00"/>
  <circle cx="295" cy="215" r="10" fill="#FF8C00"/>
  <circle cx="310" cy="210" r="10" fill="#FF8C00"/>
  
  <!-- Bread -->
  <rect x="280" y="130" width="35" height="40" rx="5" fill="#D2691E"/>
  <rect x="250" y="145" width="35" height="40" rx="5" fill="#CD853F"/>
  
  <!-- Scale -->
  <circle cx="220" cy="240" r="18" fill="#87CEEB" stroke="#4682B4" stroke-width="2"/>
  <circle cx="220" cy="240" r="12" fill="white"/>
  <text x="220" y="245" font-size="14" fill="black" text-anchor="middle">I</text>
  
  <!-- Sign/Label -->
  <rect x="240" y="50" width="80" height="50" fill="white" stroke="#333" stroke-width="2" rx="5"/>
  
  <!-- Shopkeeper -->
  <circle cx="320" cy="150" r="20" fill="#D2B48C"/>
  <rect x="310" y="170" width="20" height="35" fill="#4169E1"/>
  <rect x="305" y="205" width="30" height="25" fill="#8B4513"/>
  <circle cx="330" cy="150" r="8" fill="#F5DEB3"/>
</svg>